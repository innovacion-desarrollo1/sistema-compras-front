<div class="dashboard-container">
  
  <!-- Header -->
  <mat-toolbar color="primary" class="dashboard-header">
    <img src="assets/images/Logo-DUANA.png" alt="DUANA" class="logo">
    <span class="title">Motor de Sugerencias Manuales</span>
    <span class="spacer"></span>
    <mat-icon>account_circle</mat-icon>
  </mat-toolbar>

  <!-- Main Content -->
  <div class="dashboard-content">
    
    <!-- Step 1: Molecula Search + Period Selection -->
    <mat-card class="search-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>search</mat-icon>
          Paso 1: Seleccionar ID y Periodo
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <app-product-search
          (moleculaSelected)="onMoleculaSelected($event)">
        </app-product-search>
      </mat-card-content>
    </mat-card>

    <!-- Step 2: Molecule Inventory Information -->
    <app-molecule-inventory-info
      *ngIf="selectedMolecula"
      [molecula]="selectedMolecula"
      [periodoSemanas]="periodoSemanas">
    </app-molecule-inventory-info>

    <!-- Step 3: Supplier Comparison & Bonifications -->
    <app-supplier-ranking-table 
      *ngIf="showSupplierRanking && selectedMolecula" 
      [productoId]="selectedMolecula.id"
      [periodoSemanas]="periodoSemanas"
      (supplierSelected)="onSupplierSelected($event)">
    </app-supplier-ranking-table>

    <!-- Step 4: Demand Forecast Chart -->
<!--     <app-demand-forecast-chart 
      *ngIf="showDemandForecast && selectedMolecula" 
      [productoId]="selectedMolecula.id">
    </app-demand-forecast-chart> -->

    <!-- Two Column Layout for Suggestion & Simulation -->
    <div class="suggestion-simulation-grid" *ngIf="showSuggestionCard && currentSuggestion">
      
      <!-- Order Suggestion Card -->
      <ng-container *ngIf="!isLoading && currentSuggestion">
        <app-order-suggestion-card
          [suggestion]="currentSuggestion"
          (accepted)="onSuggestionAccepted($event)"
          (adjusted)="onSuggestionAdjusted($event)"
          (rejected)="onSuggestionRejected($event)">
        </app-order-suggestion-card>
      </ng-container>

      <!-- Cost Simulation Table -->
      <app-cost-simulation-table 
        *ngIf="showCostSimulation && currentSuggestion" 
        [productoId]="currentSuggestion.producto_id"
        [baseQuantity]="currentSuggestion.cantidad_sugerida"
        [proveedorId]="currentSuggestion.proveedor_id || 1"
        (scenarioSelected)="onScenarioSelected($event)">
      </app-cost-simulation-table>
    </div>

    <!-- Loading State for Suggestion -->
    <mat-card *ngIf="isLoading" class="loading-card">
      <mat-card-content class="loading-content">
        <mat-spinner diameter="50"></mat-spinner>
        <p>Generando sugerencia...</p>
      </mat-card-content>
    </mat-card>

    <!-- Approval Workflow -->
    <app-approval-workflow
      *ngIf="showApprovalWorkflow && approvalRequestId"
      [requestId]="approvalRequestId"
      (approved)="onApprovalGranted($event)"
      (rejected)="onApprovalDenied($event)">
    </app-approval-workflow>

    <!-- Suggestion History -->
    <app-suggestion-history></app-suggestion-history>
  </div>
</div>
